<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | WorldBox</title>
    <base href="https://cdn.jsdelivr.net/gh/Shindo957-Official/worldfox/" />
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            registrations.forEach(function (registration) {
              registration.unregister();
            });
          });
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var cdnBase = "https://cdn.jsdelivr.net/gh/SomeRandomFella/portsandrips/WorldFox/";
      var buildUrl = cdnBase + "Build";
      var loaderUrl = buildUrl + "/WorldFox.loader.js";
      var config = {
        dataUrl: buildUrl + "/WorldFox.data",
        frameworkUrl: buildUrl + "/WorldFox.framework.js",
        codeUrl: buildUrl + "/WorldFox.wasm",
        streamingAssetsUrl: cdnBase + "StreamingAssets",
        companyName: "mkarpenko",
        productName: "WorldBox",
        productVersion: "0.51.2",
        showBanner: unityShowBanner,
      };

      // By default Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      loadingBar.style.display = "block";

      function installSplitFileLoader(manifest) {
        var originalFetch = window.fetch.bind(window);
        var rootUrl = new URL(cdnBase);

        function normalizeSplitPath(input) {
          var url = new URL(typeof input === "string" ? input : input.url, cdnBase);
          var path = decodeURIComponent(url.pathname);
          var rootPath = rootUrl.pathname;
          if (path.indexOf(rootPath) === 0) {
            path = path.substring(rootPath.length);
          } else {
            path = path.replace(/^\/+/, "");
          }
          return path.replace(/\\/g, "/");
        }

        function contentTypeFor(path) {
          if (path.endsWith(".wasm")) return "application/wasm";
          if (path.endsWith(".js")) return "application/javascript";
          if (path.endsWith(".data") || path.endsWith(".bank")) return "application/octet-stream";
          return "application/octet-stream";
        }

        window.fetch = function (input, init) {
          var splitPath = normalizeSplitPath(input);
          var entry = manifest[splitPath];
          if (!entry) {
            return originalFetch(input, init);
          }
          return Promise.all(entry.parts.map(function (part) {
            return originalFetch(new URL(part, rootUrl).href, init).then(function (response) {
              if (!response.ok) {
                throw new Error("Failed to load split part " + part + ": " + response.status);
              }
              return response.arrayBuffer();
            });
          })).then(function (buffers) {
            return new Response(new Blob(buffers, { type: contentTypeFor(splitPath) }), {
              status: 200,
              statusText: "OK",
              headers: {
                "Content-Type": contentTypeFor(splitPath),
                "Content-Length": String(entry.size)
              }
            });
          });
        };
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      fetch(buildUrl + "/split-files.json").then(function (response) {
        return response.ok ? response.json() : {};
      }).then(function (manifest) {
        installSplitFileLoader(manifest || {});
        document.body.appendChild(script);
      }).catch(function () {
        installSplitFileLoader({});
        document.body.appendChild(script);
      });
    </script>
  </body>
</html>
